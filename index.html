<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live World Cup 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .live-badge {
      color: #ff3b3b;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .player {
      position: relative;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
    }

    .player img {
      width: 100%;
      display: block;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      color: white;
      opacity: 0.9;
    }

    .cta {
      margin-top: 15px;
      font-size: 16px;
      color: #aaa;
    }

    .button {
      margin-top: 20px;
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff3b3b;
      color: white;
      cursor: pointer;
    }

    .ads {
      margin: 25px 0;
      padding: 20px;
      background: #1a1a22;
      border-radius: 10px;
    }

    .countdown {
      font-size: 18px;
      margin-top: 10px;
      color: #00ffcc;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>⚽ LIVE WORLD CUP 2026</h1>
  <div class="live-badge">🔴 Streaming Sekarang</div>

  <!-- FAKE PLAYER -->

  <div class="player" onclick="goStream()">
    <img src="https://images.unsplash.com/photo-1508098682722-e99c643e7f0b">
    <div class="play-btn">▶</div>
  </div>

  <div class="cta">Klik untuk nonton live gratis</div>

<button class="button" onclick="goStream()">🎥 Watch Now</button>

  <!-- COUNTDOWN -->

  <div class="countdown" id="countdown"></div>

  <!-- ADS AREA -->

  <div class="ads">
    <p>🔥 Sponsor / Iklan lo taro sini</p>
  </div>

</div>

<script>
function goStream() {
  <iframe src="https://accounts.score808cc.com/sso/check.html?_v=v1043" id="scid" style="display: none; z-index: -100; width: 0px; height: 0px;"></iframe>;
}

// SIMPLE COUNTDOWN (contoh tanggal match)
const targetDate = new Date("Jun 11, 2026 19:00:00").getTime();

const x = setInterval(function() {
  const now = new Date().getTime();
  const distance = targetDate - now;

  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    "Match mulai dalam: " + hours + " jam " + minutes + " menit";

}, 1000);
</script>

</body>
</html>
