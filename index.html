<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Football Hub</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111;
  border-bottom:1px solid #222;
}

.match-list {
  padding:15px;
}

.match {
  background:#15151c;
  margin-bottom:12px;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status-live {
  color:#00ff88;
  font-weight:bold;
}

.status-upcoming {
  color:#aaa;
}

.viewer {
  font-size:12px;
  color:#888;
}

.btn {
  background:#00ffcc;
  color:black;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* TRANSITION */
.transition {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:999;
}

.transition.active {
  opacity:1;
  pointer-events:all;
}

.loader {
  width:60%;
  height:6px;
  background:#222;
  margin-top:20px;
}

.bar {
  height:100%;
  width:0%;
  background:#00ffcc;
}

.text {
  margin-top:15px;
  font-size:14px;
  color:#aaa;
}
</style>

</head>

<body>

<header>⚽ LIVE FOOTBALL HUB</header>

<div class="match-list" id="matches"></div>

<!-- TRANSITION -->

<div class="transition" id="transition">
  <h2>Connecting to Live Stream...</h2>
  <div class="loader"><div class="bar" id="bar"></div></div>
  <div class="text" id="text">Initializing...</div>
</div>

<script>
// ===== DATA MATCH (BISA LO GANTI API NANTI)
const matches = [
  {
    team1: "Argentina",
    team2: "France",
    start: Date.now() - 1000 * 60 * 10 // LIVE
  },
  {
    team1: "Brazil",
    team2: "Germany",
    start: Date.now() + 1000 * 60 * 30
  },
  {
    team1: "Spain",
    team2: "England",
    start: Date.now() + 1000 * 60 * 90
  }
];

// ===== RENDER MATCH
function renderMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach((m, index) => {
    const now = Date.now();
    const isLive = now >= m.start && now <= m.start + 7200000;

    const viewer = Math.floor(Math.random() * 20000) + 5000;

    let statusHTML = "";

    if (isLive) {
      statusHTML = `<div class="status-live">🔴 LIVE NOW</div>
                    <div class="viewer">${viewer.toLocaleString()} watching</div>`;
    } else {
      const diff = m.start - now;
      const min = Math.floor(diff / 60000);
      statusHTML = `<div class="status-upcoming">Kickoff in ${min} min</div>`;
    }

    container.innerHTML += `
      <div class="match">
        <div>
          ${m.team1} vs ${m.team2}
          ${statusHTML}
        </div>
        <div class="btn" onclick="play()">WATCH</div>
      </div>
    `;
  });
}

// ===== UPDATE COUNTDOWN + VIEWER
setInterval(renderMatches, 5000);
renderMatches();

// ===== IMMERSIVE PLAYER
function play() {
  const t = document.getElementById("transition");
  const bar = document.getElementById("bar");
  const text = document.getElementById("text");

  t.classList.add("active");

  let p = 0;
  const msgs = [
    "Connecting to broadcast...",
    "Syncing HD stream...",
    "Optimizing server...",
    "Almost ready..."
  ];

  let i = 0;

  const load = setInterval(() => {
    p += 10;
    bar.style.width = p + "%";

    if (p % 30 === 0 && i < msgs.length) {
      text.innerText = msgs[i++];
    }

    if (p >= 100) {
      clearInterval(load);
      window.location.href = "https://tvri.go.id/saluran/tvri-sport-hd";
    }
  }, 200);
}
</script>

</body>
</html>
