<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Live</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#050507;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.player {
  position:relative;
  cursor:pointer;
  border-radius:12px;
  overflow:hidden;
}

.player img {
  width:100%;
  filter:brightness(0.7);
}

.play {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:70px;
}

.overlay {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:10px;
}

/* FULLSCREEN TRANSITION */
.transition {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}

.transition.active {
  opacity:1;
  pointer-events:all;
}

.loader {
  width:60%;
  height:6px;
  background:#222;
  margin-top:20px;
}

.bar {
  width:0%;
  height:100%;
  background:#00ffcc;
  transition:0.2s;
}

.text {
  margin-top:15px;
  font-size:14px;
  color:#aaa;
}
</style>

</head>

<body>

<div class="container">
  <h1>⚽ WORLD CUP 2026</h1>

  <div class="player" onclick="goStream()">
    <img src="https://images.unsplash.com/photo-1518091043644-c1d4457512c6">
    <div class="play">▶</div>
    <div class="overlay">LIVE • HD • FREE</div>
  </div>
</div>

<!-- TRANSITION SCREEN -->

<div class="transition" id="transition">
  <h2>Launching HD Player...</h2>
  <div class="loader">
    <div class="bar" id="bar"></div>
  </div>
  <div class="text" id="text">Connecting to server...</div>
</div>

<script>
function goStream() {
  const trans = document.getElementById("transition");
  const bar = document.getElementById("bar");
  const text = document.getElementById("text");

  trans.classList.add("active");

  let progress = 0;

  const messages = [
    "Connecting to broadcast server...",
    "Syncing HD stream...",
    "Optimizing connection...",
    "Almost ready..."
  ];

  let msgIndex = 0;

  const interval = setInterval(() => {
    progress += 8;
    bar.style.width = progress + "%";

    if (progress % 25 === 0 && msgIndex < messages.length) {
      text.innerText = messages[msgIndex++];
    }

    if (progress >= 100) {
      clearInterval(interval);

      // REDIRECT HALUS
      window.location.href = "https://tvri.go.id/saluran/tvri-sport-hd";
    }
  }, 200);
}
</script>

</body>
</html>
